version: 2

models:
  - name: stg_macro_indicators
    description: "Cleaned macro indicator data for Bangalore and Dubai"
    columns:
      - name: price_date
        description: "Trading date"
        tests:
          - not_null
      - name: market
        description: "Market name"
        tests:
          - not_null
          - accepted_values:
              values: ['bangalore', 'dubai']
      - name: index_value
        description: "Index closing value"
        tests:
          - not_null